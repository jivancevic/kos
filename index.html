<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🏀 Pogodi koš — Leaderboard</title>
<style>
  :root{
    --bg:#0b0f1a; --card:#141a2b; --line:#222a40;
    --gold:#ffd24a; --silver:#cfd6e6; --bronze:#e0925a;
    --txt:#f4f6fc; --muted:#8b94ad; --accent:#ff6b3d; --ok:#3ad07a; --err:#ff6b6b;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    background:radial-gradient(1200px 600px at 50% -10%, #15203a 0, transparent 60%), var(--bg);
    color:var(--txt); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh; padding:20px 14px 60px;
  }
  .wrap{max-width:560px; margin:0 auto}
  header{text-align:center; margin-bottom:18px; position:relative}
  h1{font-size:26px; margin:0 0 4px; letter-spacing:.3px}
  .sub{color:var(--muted); font-size:14px}
  .gear{
    position:absolute; top:-2px; right:0; background:none; border:0; cursor:pointer;
    font-size:20px; opacity:.45; padding:6px;
  }
  .gear.on{opacity:1}
  ol{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:10px}
  li{
    display:flex; align-items:center; gap:12px;
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:12px 14px;
  }
  .rank{font-size:22px; font-weight:800; min-width:40px; text-align:center; color:var(--muted)}
  .medal{font-size:26px; min-width:40px; text-align:center}
  .name{flex:1; font-size:18px; font-weight:650; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .att{font-size:14px; color:var(--muted); white-space:nowrap}
  .att b{color:var(--txt); font-size:18px}
  li.top1{border-color:var(--gold); box-shadow:0 0 0 1px var(--gold) inset}
  li.top2{border-color:var(--silver)}
  li.top3{border-color:var(--bronze)}

  /* admin controls */
  .ctrl{display:flex; align-items:center; gap:8px}
  .ctrl button{
    width:34px; height:34px; border-radius:9px; border:1px solid var(--line);
    background:#1c2438; color:var(--txt); font-size:20px; font-weight:700; cursor:pointer;
    display:flex; align-items:center; justify-content:center; line-height:1;
  }
  .ctrl button:active{transform:scale(.92)}
  .ctrl .val{min-width:26px; text-align:center; font-size:18px; font-weight:700}
  .ctrl .rm{border-color:#3a2330; background:#2a1922; color:var(--err); font-size:16px}
  .addrow{
    display:flex; gap:8px; margin-top:12px;
  }
  .addrow input{
    flex:1; min-width:0; background:var(--card); border:1px solid var(--line); border-radius:11px;
    color:var(--txt); padding:11px 12px; font-size:16px;
  }
  .addrow input.num{flex:0 0 70px; text-align:center}
  .addrow button{
    background:var(--accent); border:0; color:#1a0f08; font-weight:800; border-radius:11px;
    padding:0 16px; font-size:15px; cursor:pointer;
  }
  .hidden{display:none !important}

  footer{text-align:center; color:var(--muted); font-size:12px; margin-top:22px; line-height:1.6}
  .dot{display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--ok); margin-right:6px; vertical-align:middle}
  #status{min-height:16px; font-weight:600}
  #status.ok{color:var(--ok)} #status.err{color:var(--err)}

  /* token modal */
  .modal{
    position:fixed; inset:0; background:rgba(4,7,14,.78); display:flex; align-items:center; justify-content:center;
    padding:20px; z-index:10;
  }
  .modal .box{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:20px; max-width:420px; width:100%}
  .modal h2{margin:0 0 8px; font-size:18px}
  .modal p{color:var(--muted); font-size:13.5px; line-height:1.5; margin:0 0 12px}
  .modal a{color:var(--accent)}
  .modal input{width:100%; background:var(--bg); border:1px solid var(--line); border-radius:10px; color:var(--txt); padding:11px; font-size:15px; margin-bottom:10px}
  .modal .row{display:flex; gap:8px}
  .modal button{flex:1; border:0; border-radius:10px; padding:11px; font-size:15px; font-weight:700; cursor:pointer}
  .modal .save{background:var(--accent); color:#1a0f08}
  .modal .cancel{background:#1c2438; color:var(--txt); border:1px solid var(--line)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <button class="gear" id="gear" title="Admin">⚙️</button>
    <h1>🏀 Pogodi koš</h1>
    <div class="sub">Tko pogodi u najmanje pokušaja • Pola Nove godine</div>
  </header>

  <ol id="board"></ol>

  <div class="addrow hidden" id="addrow">
    <input id="newName" placeholder="Ime" autocomplete="off">
    <input id="newPok" class="num" type="number" min="1" value="1" inputmode="numeric">
    <button id="addBtn">Dodaj</button>
  </div>

  <footer>
    <div><span class="dot"></span><span id="live">Uživo</span></div>
    <div id="status"></div>
    <div id="stamp"></div>
  </footer>
</div>

<div class="modal hidden" id="modal">
  <div class="box">
    <h2>🔑 Admin pristup</h2>
    <p>
      Zalijepi GitHub token (sprema se samo na ovom uređaju, nikad u repo).<br>
      Nemaš? <a id="tokenLink" href="https://github.com/settings/tokens/new?scopes=public_repo&description=kos-leaderboard" target="_blank" rel="noopener">Napravi ga ovdje</a> →
      skrolaj dolje → <b>Generate token</b> → kopiraj.
    </p>
    <input id="tokenInput" type="password" placeholder="ghp_..." autocomplete="off">
    <div class="row">
      <button class="cancel" id="tokenCancel">Odustani</button>
      <button class="save" id="tokenSave">Spremi</button>
    </div>
  </div>
</div>

<script>
  const REPO = "jivancevic/kos";
  const FILE = "data.json";
  const API  = `https://api.github.com/repos/${REPO}/contents/${FILE}`;
  const MEDALS = { 1: "🏆", 2: "🥈", 3: "🥉" };

  let state = [];                 // [{ime, pokusaj}]
  let sha = null;                 // current file sha (for writes)
  let token = localStorage.getItem("kos_gh_token") || "";
  let adminOpen = false;          // controls visible?

  const $ = id => document.getElementById(id);
  const b64enc = s => btoa(unescape(encodeURIComponent(s)));
  const b64dec = s => decodeURIComponent(escape(atob(s)));

  function pokLabel(n){
    const u = n % 10, d = n % 100;
    if (u === 1 && d !== 11) return "pokušaj";
    return "pokušaja";
  }
  function esc(s){
    return String(s).replace(/[&<>"']/g, c =>
      ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  }

  // rank map: pokusaj-value -> rank (ties share rank)
  function buildRankMap(){
    const sorted = [...state].sort((a,b)=>a.pokusaj-b.pokusaj);
    const m = new Map();
    let lastVal = null, lastRank = 0;
    sorted.forEach((r,i)=>{
      const rank = (r.pokusaj === lastVal) ? lastRank : i+1;
      lastVal = r.pokusaj; lastRank = rank;
      if (!m.has(r.pokusaj)) m.set(r.pokusaj, rank);
    });
    return m;
  }

  function render(){
    const board = $("board");
    board.innerHTML = "";
    const ranks = buildRankMap();
    // view mode: sorted; admin mode: keep stable order so rows don't jump while tapping
    const rows = adminOpen ? state.map((r,i)=>({r,i})) : [...state].map((r,i)=>({r,i:state.indexOf(r)})).sort((a,b)=>a.r.pokusaj-b.r.pokusaj);

    rows.forEach(({r,i}) => {
      const rank = ranks.get(r.pokusaj);
      const li = document.createElement("li");
      if (rank <= 3 && !adminOpen) li.className = "top"+rank;

      const left = (MEDALS[rank] && !adminOpen)
        ? `<div class="medal">${MEDALS[rank]}</div>`
        : `<div class="rank">${rank}.</div>`;

      let right;
      if (adminOpen){
        right = `<div class="ctrl">
            <button data-act="dec" data-i="${i}">−</button>
            <span class="val">${r.pokusaj}</span>
            <button data-act="inc" data-i="${i}">+</button>
            <button class="rm" data-act="rm" data-i="${i}">✕</button>
          </div>`;
      } else {
        right = `<div class="att"><b>${r.pokusaj}</b> ${pokLabel(r.pokusaj)}</div>`;
      }

      li.innerHTML = `${left}<div class="name">${esc(r.ime)}</div>${right}`;
      board.appendChild(li);
    });

    $("stamp").textContent = "Zadnje učitano: " + new Date().toLocaleTimeString("hr-HR");
  }

  function setStatus(msg, cls){
    const el = $("status");
    el.textContent = msg || "";
    el.className = cls || "";
    if (msg && cls === "ok") setTimeout(()=>{ if($("status").textContent===msg){$("status").textContent="";$("status").className="";} }, 2500);
  }

  // ---- data load ----
  async function load(){
    try{
      const headers = { "Accept":"application/vnd.github+json" };
      if (token) headers.Authorization = "Bearer " + token;
      const res = await fetch(API + "?_=" + Date.now(), { headers, cache:"no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const j = await res.json();
      sha = j.sha;
      const data = JSON.parse(b64dec(j.content));
      state = Array.isArray(data) ? data : (data.rezultati || []);
      render();
    }catch(e){
      setStatus("Ne mogu učitati (" + e.message + ")", "err");
    }
  }

  // ---- save (serialized) ----
  let saving = false, pending = false;
  async function save(){
    if (!token){ openModal(); return; }
    if (saving){ pending = true; return; }
    saving = true; setStatus("Spremam…", "");
    try{
      const body = {
        message: "Update rezultata",
        content: b64enc(JSON.stringify({ rezultati: state }, null, 2) + "\n"),
        sha,
        branch: "main"
      };
      let res = await fetch(API, {
        method:"PUT",
        headers:{ "Authorization":"Bearer "+token, "Accept":"application/vnd.github+json" },
        body: JSON.stringify(body)
      });
      if (res.status === 409){ // sha changed elsewhere — refresh sha and retry once
        await refreshSha(); body.sha = sha;
        res = await fetch(API, { method:"PUT",
          headers:{ "Authorization":"Bearer "+token, "Accept":"application/vnd.github+json" },
          body: JSON.stringify(body) });
      }
      if (res.status === 401) throw new Error("token nevažeći");
      if (!res.ok) throw new Error("HTTP " + res.status);
      const j = await res.json();
      sha = j.content.sha;
      setStatus("Spremljeno ✓", "ok");
    }catch(e){
      setStatus("Greška: " + e.message, "err");
    }
    saving = false;
    if (pending){ pending = false; save(); }
  }
  async function refreshSha(){
    const headers = { "Accept":"application/vnd.github+json", "Authorization":"Bearer "+token };
    const res = await fetch(API + "?_=" + Date.now(), { headers, cache:"no-store" });
    if (res.ok){ sha = (await res.json()).sha; }
  }

  // ---- mutations ----
  function inc(i){ state[i].pokusaj++; render(); save(); }
  function dec(i){ if (state[i].pokusaj > 1){ state[i].pokusaj--; render(); save(); } }
  function rm(i){ state.splice(i,1); render(); save(); }
  function add(){
    const name = $("newName").value.trim();
    const pok = Math.max(1, parseInt($("newPok").value, 10) || 1);
    if (!name) { $("newName").focus(); return; }
    state.push({ ime:name, pokusaj:pok });
    $("newName").value = ""; $("newPok").value = "1";
    render(); save();
  }

  // ---- admin toggle / modal ----
  function setAdmin(on){
    adminOpen = on;
    $("gear").classList.toggle("on", on);
    $("addrow").classList.toggle("hidden", !on);
    $("live").textContent = on ? "Admin mod" : "Uživo";
    render();
  }
  function openModal(){ $("tokenInput").value = token; $("modal").classList.remove("hidden"); $("tokenInput").focus(); }
  function closeModal(){ $("modal").classList.add("hidden"); }

  // ---- events ----
  $("board").addEventListener("click", e => {
    const btn = e.target.closest("button[data-act]");
    if (!btn) return;
    const i = +btn.dataset.i, act = btn.dataset.act;
    if (act === "inc") inc(i);
    else if (act === "dec") dec(i);
    else if (act === "rm") rm(i);
  });
  $("addBtn").addEventListener("click", add);
  $("newName").addEventListener("keydown", e => { if (e.key === "Enter") add(); });

  $("gear").addEventListener("click", () => {
    if (!token){ openModal(); return; }
    setAdmin(!adminOpen);
  });
  $("tokenSave").addEventListener("click", () => {
    const t = $("tokenInput").value.trim();
    if (!t){ return; }
    token = t; localStorage.setItem("kos_gh_token", t);
    closeModal(); setAdmin(true); load();
  });
  $("tokenCancel").addEventListener("click", closeModal);

  // ---- boot + polling ----
  load();
  setInterval(() => { if (!adminOpen) load(); }, token ? 8000 : 60000);
</script>
</body>
</html>
